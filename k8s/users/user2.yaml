---
apiVersion: v1
kind: Service
metadata:
  name: webapp-service
  namespace: user2
spec:
  selector:
    app: webapp
  ports:
  - port: 80
    targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-ingress
  namespace: user2
spec:
  rules:
  - host: user2.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webapp-service
            port:
              number: 80